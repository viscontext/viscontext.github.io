$schema: https://json-schema.org/draft/2020-12/schema
$id: https://viscontext.github.io/schemas/0.2.0/record.schema.json
title: Experimental visualization project context record
type: object
additionalProperties: false
required:
  - id
  - version
  - frameworkVersion
  - status
  - work
  - contributors
  - sections
properties:
  id:
    type: string
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  version:
    type: string
    pattern: ^0\.[0-9]+\.[0-9]+$
  frameworkVersion:
    const: 0.2.0
  status:
    enum:
      - example
      - published
      - withdrawn
  work:
    type: object
    additionalProperties: false
    required:
      - type
      - topic
      - visualKind
      - title
      - year
      - fictional
      - canonicalUrl
    properties:
      type:
        enum:
          - static
          - interactive
          - dashboard
          - story
      topic:
        enum:
          - cities
          - climate
          - economy
          - energy
          - mobility
      visualKind:
        enum:
          - bars
          - dashboard
          - line
          - map
          - scatter
          - small-multiples
      title:
        type: string
        minLength: 1
        maxLength: 160
      year:
        type: integer
        minimum: 1900
        maximum: 2100
      fictional:
        const: true
      canonicalUrl:
        type: string
        format: uri
  contributors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - displayName
        - role
      properties:
        displayName:
          type: string
          minLength: 1
        role:
          enum:
            - creator
            - example-maintainer
  sections:
    type: object
    additionalProperties: false
    required:
      - project
      - usage
      - data
      - analysis
      - encoding
      - limitations
    properties:
      project:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/project.schema.json
      usage:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/usage.schema.json
      data:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/data.schema.json
      analysis:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/analysis.schema.json
      encoding:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/encoding.schema.json
      limitations:
        $ref: https://viscontext.github.io/schemas/0.2.0/sections/limitations.schema.json
