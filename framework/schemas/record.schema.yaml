$schema: https://json-schema.org/draft/2020-12/schema
$id: https://viscontext.github.io/schemas/0.4.0/record.schema.json
title: Experimental visualization project context record
type: object
additionalProperties: false
required:
  - id
  - version
  - frameworkVersion
  - status
  - work
  - contributors
  - visualizations
  - sections
properties:
  id:
    type: string
    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
  version:
    type: string
    pattern: ^0\.[0-9]+\.[0-9]+$
  frameworkVersion:
    const: 0.4.0
  status:
    enum:
      - example
      - published
      - withdrawn
  work:
    type: object
    additionalProperties: false
    required:
      - type
      - topic
      - visualKind
      - title
      - year
      - fictional
      - canonicalUrl
    properties:
      type:
        enum:
          - static
          - interactive
          - dashboard
          - story
          - video
      topic:
        enum:
          - cities
          - climate
          - economy
          - energy
          - environment
          - health
          - mobility
          - society
      visualKind:
        enum:
          - bars
          - animation
          - dashboard
          - line
          - map
          - scatter
          - small-multiples
      title:
        type: string
        minLength: 1
        maxLength: 160
      year:
        type: integer
        minimum: 1900
        maximum: 2100
      fictional:
        type: boolean
      canonicalUrl:
        type: string
        format: uri
  contributors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - displayName
        - role
      properties:
        displayName:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        affiliation:
          type: string
          minLength: 1
  provenance:
    type: object
    additionalProperties: false
    required:
      - mode
      - provider
      - externalId
      - sourceUrl
      - retrievedAt
      - attribution
      - normalizationNotes
    properties:
      mode:
        const: imported
      provider:
        type: string
        minLength: 1
      externalId:
        type: string
        minLength: 1
      sourceUrl:
        type: string
        format: uri
      metadataUrl:
        type: string
        format: uri
      archivedUrl:
        type: string
        format: uri
      retrievedAt:
        type: string
        pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
      sourceUpdatedAt:
        type: string
        minLength: 1
      attribution:
        type: string
        minLength: 1
      normalizationNotes:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
  visualizations:
    type: object
    additionalProperties: false
    required:
      - totalCount
      - listingMode
      - items
    properties:
      totalCount:
        type: integer
        minimum: 1
      listingMode:
        enum:
          - complete
          - sampled
      items:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - title
            - visualKind
            - description
          properties:
            id:
              type: string
              pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
            title:
              type: string
              minLength: 1
            visualKind:
              enum:
                - bars
                - animation
                - dashboard
                - line
                - map
                - scatter
                - small-multiples
            description:
              type: string
              minLength: 1
            context:
              type: object
              additionalProperties: false
              properties:
                chartType:
                  type: string
                visualEncoding:
                  type: string
                knownLimitations:
                  type: string
            media:
              type: object
              additionalProperties: false
              required:
                - selection
                - items
              properties:
                selection:
                  enum:
                    - complete
                    - representative
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - id
                      - label
                      - kind
                    properties:
                      id:
                        type: string
                        pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
                      label:
                        type: string
                        minLength: 1
                      kind:
                        enum:
                          - data
                          - frame-set
                          - image
                          - interactive
                          - metadata
                          - video
                      url:
                        type: string
                        format: uri
                      format:
                        type: string
                        minLength: 1
                      dimensions:
                        type: string
                        minLength: 1
                      fileSize:
                        type: string
                        minLength: 1
                      itemCount:
                        type: integer
                        minimum: 1
                      description:
                        type: string
                        minLength: 1
  sections:
    type: object
    additionalProperties: false
    required:
      - project
      - usage
      - data
      - analysis
      - encoding
      - limitations
    properties:
      project:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/project.schema.json
      usage:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/usage.schema.json
      data:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/data.schema.json
      analysis:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/analysis.schema.json
      encoding:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/encoding.schema.json
      limitations:
        $ref: https://viscontext.github.io/schemas/0.4.0/sections/limitations.schema.json
