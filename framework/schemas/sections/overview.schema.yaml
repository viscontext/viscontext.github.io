$schema: https://json-schema.org/draft/2020-12/schema
$id: https://viscontext.github.io/schemas/0.1.0/sections/overview.schema.json
title: Provisional overview section
type: object
additionalProperties: false
required:
  - description
  - visualUrl
  - intendedUse
  - knownLimitation
properties:
  description:
    type: string
    minLength: 1
    maxLength: 500
  visualUrl:
    type: string
    format: uri
  intendedUse:
    type: string
    minLength: 1
    maxLength: 1000
  knownLimitation:
    type: string
    minLength: 1
    maxLength: 1000
