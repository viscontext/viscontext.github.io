$schema: https://json-schema.org/draft/2020-12/schema
$id: https://viscontext.github.io/schemas/0.2.0/sections/project.schema.json
title: Project section
type: object
additionalProperties: false
required: [description, projectUrl, publicationDate, license]
properties:
  description:
    type: string
    minLength: 1
  projectUrl:
    type: string
    format: uri
  publicationDate:
    type: string
    minLength: 1
  license:
    type: string
    minLength: 1
