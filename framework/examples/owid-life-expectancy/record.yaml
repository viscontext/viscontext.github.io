sections:
  project:
    description: Our World in Data long-run chart compiling country, regional, and global period life-expectancy estimates from several historical and contemporary sources.
    projectUrl: https://ourworldindata.org/grapher/life-expectancy
    publicationDate: Indicator metadata updated 22 October 2025
    license: OWID-produced visualization and text are CC BY; each underlying dataset remains subject to its original terms.
  usage:
    intent: Show long-run improvements and setbacks in mortality conditions and compare period life expectancy across places and time.
    targetAudience: null
    recommendedInterpretation: Treat values as a summary of mortality rates observed in a particular year, not a prediction of how long a real birth cohort will eventually live.
  data:
    sources: Human Mortality Database and Zijdeman et al. for pre-1950 country observations, Riley for pre-1950 regional estimates, and UN World Population Prospects from 1950 onward.
    collectionPeriod: 1543 to 2023, with coverage varying substantially by place and historical period
    updateFrequency: The metadata lists annual updates, with the next update expected 22 October 2026.
  analysis:
    processing: OWID combines several sources, prioritizes Human Mortality Database where pre-1950 country sources overlap, uses Riley for early regional estimates, and switches to UN estimates from 1950 onward.
    codeUrl: null
  encoding:
    chartType: Interactive line chart, choropleth map, and data table
    visualEncoding: Life expectancy in years is represented by line position or map color; selected countries and regions form comparison series.
    interaction: Readers can select places and years, switch views, inspect source-specific points, and download data and metadata.
  limitations:
    knownLimitations: Historical coverage is uneven, multiple sources are stitched across time, and period life expectancy differs conceptually from cohort lifespan.
    uncertainty: The chart metadata does not provide a single quantitative uncertainty interval across the compiled source series.
