sections:
  project:
    description: Our World in Data chart comparing annual territorial carbon-dioxide emissions from fossil fuels and industry across countries, regions, and the world.
    projectUrl: https://ourworldindata.org/grapher/annual-co2-emissions-per-country
    publicationDate: Indicator metadata updated 13 November 2025
    license: OWID-produced visualization and text are CC BY; Global Carbon Budget data and other third-party material remain subject to their original terms.
  usage:
    intent: Support comparison of the scale and historical development of fossil-fuel and industrial CO₂ emissions.
    targetAudience: null
    recommendedInterpretation: Compare territorial annual totals while accounting for country size, trade, excluded land-use emissions, and separately reported international transport.
  data:
    sources: Global Carbon Budget 2025, original dataset Global Carbon Budget v15, with major processing by Our World in Data.
    collectionPeriod: 1750 to 2024
    updateFrequency: The metadata lists annual updates, with the next update expected 13 November 2026.
  analysis:
    processing: OWID converts tonnes of carbon to tonnes of CO₂ using a factor of 3.664 and assigns the 1991 Kuwaiti oil-fire emissions to Kuwait.
    codeUrl: null
  encoding:
    chartType: Interactive line chart, choropleth map, and data table
    visualEncoding: Emission totals are represented by line position or map color; country and time selections control the visible subset.
    interaction: Readers can select places and years, switch chart views, inspect values, and download subsets, complete data, and metadata.
  limitations:
    knownLimitations: Values exclude land-use change and use territorial accounting; imported-goods emissions are assigned to the producing country, while international aviation and shipping are excluded from national totals.
    uncertainty: The chart metadata does not specify or encode quantitative uncertainty intervals.
