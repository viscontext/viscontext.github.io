sections:
  project:
    description: NASA SVS animation combining satellite-derived products into an unbroken global view of sea-surface salinity from 2011 through 2021.
    projectUrl: https://svs.gsfc.nasa.gov/5017/
    publicationDate: 26 August 2022
    license: NASA media usage guidelines apply; the source requests credit to NASA's Scientific Visualization Studio and third-party rights may apply.
  usage:
    intent: Show where ocean surface water is saltier or fresher and how salinity changes over a decade in response to evaporation, precipitation, rivers, and sea ice.
    targetAudience: null
    recommendedInterpretation: Read warm colors as higher salinity and cool colors as fresher water; spatial patterns reflect several interacting freshwater and evaporation processes.
  data:
    sources: OISSS_L4_multimission_7day_v1 from PODAAC, Comiso's Daily Sea Ice Concentration, and Natural Earth river data; NASA SVS dataset IDs 1156, 539, and 1159.
    collectionPeriod: 1 September 2011 to 1 September 2021
    updateFrequency: null
  analysis:
    processing: The OISSS product optimally interpolates observations from SMAP, Aquarius, and SMOS into a seven-day multi-mission sea-surface salinity record.
    codeUrl: null
  encoding:
    chartType: Animated global raster map
    visualEncoding: A warm-to-cool color scale represents high-to-low salinity, with date and legend overlays available as separate production assets.
    interaction: Non-interactive animation with multiple video resolutions, frame sets, overlays, still images, and a Hyperwall package.
  limitations:
    knownLimitations: null
    uncertainty: The public source page does not describe or visually encode uncertainty for the interpolated salinity product.
