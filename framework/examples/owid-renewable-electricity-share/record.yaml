sections:
  project:
    description: Our World in Data chart comparing the percentage of electricity generated from solar, wind, hydropower, bioenergy, geothermal, wave, and tidal sources.
    projectUrl: https://ourworldindata.org/grapher/share-electricity-renewables
    publicationDate: Indicator metadata updated 24 April 2026
    license: OWID-produced visualization and text are CC BY; Ember and Energy Institute data remain subject to their original terms.
  usage:
    intent: Compare how strongly countries and regions rely on renewable sources for electricity production and how those shares change over time.
    targetAudience: null
    recommendedInterpretation: Read percentages as renewable generation divided by total electricity production, not as renewable energy's share of all energy consumption.
  data:
    sources: Ember Yearly Electricity Data and Energy Institute Statistical Review of World Energy, with major processing by Our World in Data.
    collectionPeriod: 1985 to 2025
    updateFrequency: The metadata lists annual updates, with the next update expected 24 April 2027.
  analysis:
    processing: Ember supplies data from 2000 onward globally and from 1990 onward for European countries including Turkey; Energy Institute data supplies earlier observations.
    codeUrl: null
  encoding:
    chartType: Interactive line chart, choropleth map, and data table
    visualEncoding: Renewable shares are represented by line position or map color on a percentage scale.
    interaction: Readers can select places and years, switch views, inspect values, and download data and metadata.
  limitations:
    knownLimitations: The series combines providers across time; renewable electricity share is not equivalent to renewable share of total primary or final energy.
    uncertainty: The chart metadata does not specify or encode quantitative uncertainty intervals.
