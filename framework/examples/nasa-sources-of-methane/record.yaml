sections:
  project:
    description: NASA SVS project explaining the sources, global distribution, and atmospheric transport of methane through a narrated 3D visualization and downloadable production assets.
    projectUrl: https://svs.gsfc.nasa.gov/4799
    publicationDate: 9 July 2020
    license: NASA media usage guidelines apply; the source requests credit to NASA's Scientific Visualization Studio and third-party rights may apply.
  usage:
    intent: Explain the relative sources and global atmospheric transport of methane and support understanding of observations and carbon-climate feedbacks.
    targetAudience: null
    recommendedInterpretation: Read highlighted source regions together with atmospheric transport; concentrations over a location can reflect both local emissions and transported methane.
  data:
    sources: GMAO GEOS atmospheric methane model output, LPJ-wsl wetland estimates, satellite-derived wetland coverage, and inventories of human activity. NASA SVS dataset ID 1066.
    collectionPeriod: 9 December 2017 to 1 December 2018
    updateFrequency: null
  analysis:
    processing: GEOS model output combines source inventories and modeled wetland emissions; source regions are highlighted over time in a 3D atmospheric rendering.
    codeUrl: null
  encoding:
    chartType: Narrated 3D volumetric globe animation
    visualEncoding: Atmospheric methane is rendered around the globe with highlighted regional source outflows, a date overlay, and a color scale.
    interaction: Non-interactive video with downloadable narrated, music-only, image, and frame-set renditions.
  limitations:
    knownLimitations: The atmosphere and topography are vertically exaggerated by approximately 50 times, and the visualization uses modeled emissions and transport rather than direct global measurement.
    uncertainty: The source discusses uncertainty in estimating methane sources and sinks but does not encode a quantitative uncertainty layer in the visualization.
