sections:
  project:
    description: Interactive visualization atlas showing how the benefits and potential costs of UK net-zero interventions vary across benefits, communities, socioeconomic factors, data zones, and nations.
    projectUrl: https://ukcobenefitsatlas.net/
    publicationDate: 25 June 2025
    license: No explicit reuse license is stated on the Atlas; its source repository is public but declares no software license.
  usage:
    intent: Support just and sustainable net-zero decisions by showing how, when, where, and for whom social, economic, and environmental co-benefits emerge.
    targetAudience: Businesses seeking net-zero opportunities; communities and policymakers with net-zero mandates; and researchers and analysts studying socioeconomic co-benefits.
    recommendedInterpretation: Treat values as modeled outcomes under climate-action scenarios, compare benefits with potential hassle costs, and inspect local context before prioritizing interventions.
  data:
    sources: Climate Change Committee Seventh Carbon Budget scenarios combined with localized demographics, air quality, transport, housing-efficiency, and socioeconomic data for 46,426 UK data zones.
    collectionPeriod: Forward-looking Seventh Carbon Budget interventions with societal benefits modeled over approximately twenty years.
    updateFrequency: No update policy is stated; the live Atlas reports its latest update date.
  analysis:
    processing: The CO-BENS team models eleven co-benefits for more than one thousand possible climate interventions, incorporating local context to estimate where and when benefits and costs emerge.
    codeUrl: https://github.com/Edinburgh-Futures-Institute/CoBenefits
  encoding:
    chartType: Interactive atlas combining choropleth maps, generated dashboards, temporal charts, relationship plots, and explanatory narratives
    visualEncoding: Benefits, costs, and socioeconomic factors are encoded through geographic color, temporal position, comparative position, and coordinated summary values.
    interaction: Readers can select benefit and factor layers, search places, change geography levels, and navigate generated benefit, location, factor, and nation reports.
  limitations:
    knownLimitations: Values are modeled estimates dependent on intervention scenarios and local input data; the Atlas also identifies hassle costs and behavioral barriers that can offset benefits.
    uncertainty: The reviewed overview pages do not describe a consistent quantitative uncertainty encoding across all generated reports.
