sections:
  project:
    description: NASA Carbon Monitoring System visualization of modeled net ecosystem exchange—the balance of carbon dioxide absorbed and released by ecosystems—from 2000 to 2018.
    projectUrl: https://svs.gsfc.nasa.gov/5047/
    publicationDate: 30 November 2022
    license: NASA media usage guidelines apply; the source requests credit to NASA's Scientific Visualization Studio and third-party rights may apply.
  usage:
    intent: Explain seasonal and interannual patterns in ecosystem-atmosphere carbon exchange and the role of modeled flux estimates in climate research.
    targetAudience: null
    recommendedInterpretation: Seasonal changes show vegetation absorbing more carbon during growing seasons and releasing more during fall and winter; unusual years can reflect drought and other climate variability.
  data:
    sources: GEOS-Carb CASA-GFED Monthly Fire Fuel NPP Rh NEE Fluxes, NASA SVS dataset ID 1164, DOI 10.5067/03147VMJE8J9.
    collectionPeriod: 2000 to 2018
    updateFrequency: null
  analysis:
    processing: CASA-GFED3 combines AVHRR and MODIS vegetation observations with MERRA-2 temperature and precipitation estimates to model monthly carbon flux.
    codeUrl: null
  encoding:
    chartType: Animated global raster map
    visualEncoding: Color represents modeled net ecosystem exchange while animation represents monthly and annual change.
    interaction: Non-interactive video with downloadable WebM, MP4, preview images, and a production frame set.
  limitations:
    knownLimitations: Direct global measurement is not possible; the values are observationally informed model estimates and depend on CASA-GFED3 assumptions and inputs.
    uncertainty: No quantitative uncertainty layer is shown in the published animation.
