sections:
  project:
    description: Our World in Data chart presenting the Human Development Index as a cross-country and historical measure of health, education, and material living standards.
    projectUrl: https://ourworldindata.org/grapher/human-development-index
    publicationDate: Indicator metadata updated 7 May 2025
    license: OWID-produced visualization and text are CC BY; UNDP data and other third-party material remain subject to their original terms.
  usage:
    intent: Support broad comparisons of human development across countries and over time.
    targetAudience: null
    recommendedInterpretation: Higher values indicate higher average achievement across health, education, and income; use the index as a broad summary rather than a complete account of wellbeing.
  data:
    sources: UNDP Human Development Report (2025), with minor processing by Our World in Data; OWID regions are included as a supporting variable.
    collectionPeriod: 1990 to 2023
    updateFrequency: The metadata lists the next update for 22 July 2026.
  analysis:
    processing: OWID reports minor processing. UNDP normalizes life expectancy, schooling, and gross national income indices and combines them using a geometric mean.
    codeUrl: null
  encoding:
    chartType: Interactive choropleth map, time-series chart, and data table
    visualEncoding: HDI is represented by map color or vertical position; country and time selections control the visible subset.
    interaction: Readers can switch views, select countries and years, inspect values, download subsets or complete data, and open metadata.
  limitations:
    knownLimitations: HDI does not capture inequality, sustainability, or subjective wellbeing and compresses three dimensions into one national average.
    uncertainty: The chart metadata does not specify a quantitative uncertainty interval for HDI values.
