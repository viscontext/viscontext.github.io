sections:
  project:
    description: IPCC AR6 Working Group II synthesis figure summarizing observed global and regional impacts on ecosystems and human systems that are attributed to climate change.
    projectUrl: https://www.ipcc.ch/report/ar6/wg2/figures/summary-for-policymakers/figure-spm-2/
    publicationDate: "2022"
    license: IPCC copyright policy permits limited unchanged reproduction for personal non-commercial use with full source acknowledgment; other use requires permission.
  usage:
    intent: Summarize where assessed evidence identifies climate-change impacts on ecosystems and human systems and communicate confidence in attribution.
    targetAudience: Policymakers and general readers of the AR6 Working Group II Summary for Policymakers, as well as adaptation practitioners, researchers, educators, and communicators.
    recommendedInterpretation: Read each impact assessment together with its geographic scope and confidence level; do not interpret a regional result as a country-specific finding.
  data:
    sources: Assessed literature on observed ecosystem and human-system impacts, including large studies, multi-species analyses, meta-analyses, reviews, and regional studies.
    collectionPeriod: null
    updateFrequency: Static figure from the 2022 AR6 Working Group II assessment.
  analysis:
    processing: IPCC authors synthesize assessed evidence at global and regional levels and assign confidence to attribution of observed impacts to climate change.
    codeUrl: null
  encoding:
    chartType: Global and regional evidence-synthesis matrix with impact categories and confidence assessments
    visualEncoding: Grouping and labels organize ecosystem and human-system impacts by scale and region; confidence levels encode strength of attribution evidence.
    interaction: Static figure available as a downloadable PNG.
  limitations:
    knownLimitations: Global assessments can reach higher confidence because they draw on broader evidence; regional studies may be smaller, have limited data, and assess whole regions rather than countries.
    uncertainty: Confidence levels explicitly represent uncertainty in attributing observed impacts to climate change.
