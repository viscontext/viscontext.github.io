sections:
  project:
    description: Interactive companion to IPCC AR6 Working Group I for flexible global and regional exploration of observed and projected climate information and climatic impact-drivers.
    projectUrl: https://interactive-atlas.ipcc.ch/
    publicationDate: "2021"
    license: Exported PNG and PDF figures are IPCC property under the IPCC copyright policy; downloadable NetCDF and GeoTIFF data and final harmonized datasets are available under CC BY 4.0.
  usage:
    intent: Extend the Working Group I assessment with configurable regional climate analysis for policymakers, researchers, practitioners, and users in different regions and sectors.
    targetAudience: Policymakers, climate researchers, regional analysts, impact and adaptation practitioners, educators, and sectoral users.
    recommendedInterpretation: Select the scientific question, dataset, variable, region, baseline, scenario or warming level first; then inspect ensemble spread, robustness, provenance, and scale before using a displayed pattern.
  data:
    sources: Global and regional observations plus CMIP5, CMIP6, and CORDEX projections for atmospheric and oceanic variables, extreme indices, climatic impact-drivers, population density, and greenhouse-gas concentrations under SSPs.
    collectionPeriod: Historical observations and simulations together with future periods and warming levels used in AR6 WGI; coverage varies by variable and source dataset.
    updateFrequency: No recurring update policy is stated; the Atlas is tied to the AR6 Working Group I assessment and maintains an errata log.
  analysis:
    processing: Sources undergo harmonization of grids, units, resolutions, and monthly values; workflows include re-gridding, aggregation, bias adjustment, index calculation, regional averaging, and METACLIP semantic provenance generation.
    codeUrl: https://github.com/IPCC-WG1/Atlas
  encoding:
    chartType: Interactive climate atlas combining maps, time series, scatter plots, tables, annual cycles, stripes, and regional synthesis views
    visualEncoding: Spatial, temporal, scenario, warming-level, ensemble, and confidence dimensions are expressed through coordinated geography, position, color, bands, hatching, and assessment categories.
    interaction: Users can select datasets, variables, indices, seasons, baselines, periods, scenarios, warming levels, regions, and output formats; maps can be exported as graphics and GIS data.
  limitations:
    knownLimitations: Functionality and granularity remain constrained by predefined regions and averaging periods; model and observational coverage varies, and complex processing can make complete end-to-end provenance difficult to inspect.
    uncertainty: The Atlas provides robustness representations, ensemble ranges, assessment confidence, and semantic provenance, but uncertainty treatment varies by product and data source.
