  items:
    - id: temperature-history
      title: Panel A — Long-term global temperature history
      visualKind: line
      description: Paleoclimate reconstructions for years 1–2000 and direct observations for 1850–2020, shown relative to the 1850–1900 baseline and decadally averaged.
      context:
        chartType: Long-run line chart with reconstruction uncertainty
        visualEncoding: Grey and black lines distinguish reconstructed and observed temperature; shading and an interval bar show very likely ranges and historical warm-period context.
        knownLimitations: Reconstruction and instrumental records have different coverage and uncertainty, and decadal averaging suppresses annual variability.
