    - id: observed-and-simulated-warming
      title: Panel B — Observed and simulated recent warming
      visualKind: line
      description: Observed annual global surface temperature change from 1850–2020 compared with CMIP6 simulations using human-plus-natural drivers and natural-only drivers.
      context:
        chartType: Comparative observed and ensemble-model time series
        visualEncoding: Black observations are compared with brown human-plus-natural and green natural-only ensemble means; colored shading shows very likely simulation ranges.
        knownLimitations: Multi-model means and ranges summarize model ensembles and do not represent every structural or observational uncertainty separately.
sections:
  project:
    description: Two-panel IPCC AR6 Working Group I synthesis figure comparing long-term temperature history, direct observations, and climate-model simulations to communicate the causes of recent warming.
    projectUrl: https://www.ipcc.ch/report/ar6/wg1/figures/summary-for-policymakers/figure-spm-1/
    publicationDate: "2021"
    license: IPCC copyright policy permits limited unchanged reproduction for personal non-commercial use with full source acknowledgment; other use requires permission.
  usage:
    intent: Communicate how recent global warming compares with long-term climate history and why natural drivers alone cannot reproduce observed recent warming.
    targetAudience: Policymakers and general readers of the AR6 Working Group I Summary for Policymakers, as well as researchers, educators, and communicators.
    recommendedInterpretation: Read Panel A for historical context and Panel B for attribution evidence; compare observations with both model-driver ensembles and retain the uncertainty ranges.
  data:
    sources: Paleoclimate archives, direct global surface-temperature observations, and CMIP6 simulations with human and natural forcings or natural-only forcings.
    collectionPeriod: Paleoclimate reconstruction years 1–2000; instrumental observations and model comparison 1850–2020
    updateFrequency: Static figure from the 2021 AR6 Working Group I assessment.
  analysis:
    processing: Values are expressed relative to 1850–1900; Panel A is decadally averaged, Panel B uses annual observations and multi-model averages, and uncertainty is summarized using assessed very likely ranges.
    codeUrl: null
  encoding:
    chartType: Two-panel line figure with historical reconstruction, observations, model ensembles, interval bars, and uncertainty bands
    visualEncoding: Time and temperature position form the primary encoding; source and forcing assumptions use color and line identity, while shaded intervals encode assessed uncertainty.
    interaction: Static figure with separate downloadable PNG and linked figure dataset.
  limitations:
    knownLimitations: The panels combine evidence with different temporal resolution, coverage, and uncertainty; the 1850–1900 baseline and ensemble summaries are essential to interpretation.
    uncertainty: Grey and colored shading, plus an interval bar, encode very likely ranges for reconstructions and model simulations.
